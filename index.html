<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unify — Social Search</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
      --hn: #ff6314;
      --yt: #ff0000;
      --reddit: #ff4500;
      --fb: #1877f2;
      --wiki: #3366cc;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      padding: 60px 20px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 40px;
    }

    /* SEARCH */
    .search-wrap {
      max-width: 640px;
      margin: 0 auto;
      position: relative;
    }

    .search-inner {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .search-inner:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    .search-inner input {
      flex: 1;
      padding: 18px 24px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .search-inner input::placeholder { color: var(--muted); }

    .search-inner button {
      padding: 12px 28px;
      margin: 6px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .search-inner button:hover { opacity: 0.9; transform: scale(1.02); }
    .search-inner button:active { transform: scale(0.98); }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(124,58,237,0.1);
    }

    /* MAIN */
    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .platform-counts {
      display: flex;
      gap: 12px;
    }

    .platform-count {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    /* CARDS */
    .post-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .post-card:hover {
      border-color: rgba(124,58,237,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-hn { background: rgba(255,99,20,0.15); color: var(--hn); }
    .badge-youtube { background: rgba(255,0,0,0.15); color: var(--yt); }
    .badge-reddit { background: rgba(255,69,0,0.15); color: var(--reddit); }
    .badge-facebook { background: rgba(24,119,242,0.15); color: var(--fb); }
    .badge-wikipedia { background: rgba(51,102,204,0.15); color: var(--wiki); }

    .card-meta {
      display: flex;
      gap: 12px;
      color: var(--muted);
      font-size: 0.78rem;
      margin-left: auto;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 12px;
      color: var(--text);
    }

    .card-title a {
      color: inherit;
      text-decoration: none;
    }

    .card-title a:hover { color: #a78bfa; }

    .card-thumb {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 12px;
      max-height: 220px;
      object-fit: cover;
    }

    .card-footer {
      display: flex;
      gap: 16px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .card-footer span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 80px 20px;
    }

    .pulse-ring {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { color: var(--muted); font-size: 0.9rem; }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .hero-platforms {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .hero-platform {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .logo { font-size: 2rem; }
      .card-meta { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">✦ Unify</div>
  <p class="tagline">Търси в социалните мрежи на едно място</p>
  <div class="search-wrap">
    <div class="search-inner">
      <input type="text" id="searchInput" placeholder="Потърси човек, тема, събитие..." autocomplete="off" />
      <button onclick="search()">Търси</button>
    </div>
    <div class="filters" id="filters" style="display:none">
      <button class="filter-btn active" onclick="filterBy('all', this)">Всички</button>
      <button class="filter-btn" onclick="filterBy('HackerNews', this)">HackerNews</button>
      <button class="filter-btn" onclick="filterBy('YouTube', this)">YouTube</button>
      <button class="filter-btn" onclick="filterBy('Reddit', this)">Reddit</button>
      <button class="filter-btn" onclick="filterBy('Facebook', this)">Facebook</button>
    </div>
  </div>
</header>

<div class="container">
  <div id="statsBar" class="stats-bar" style="display:none"></div>
  <div id="results">
    <div class="hero">
      <p>Въведи търсене за да намериш постове от всички платформи</p>
      <div class="hero-platforms">
        <span class="hero-platform">🟠 HackerNews</span>
        <span class="hero-platform">🔴 YouTube</span>
        <span class="hero-platform">🟤 Reddit</span>
        <span class="hero-platform">🔵 Facebook</span>
      </div>
    </div>
  </div>
</div>

<script>
  let allPosts = [];
  let currentFilter = 'all';

  document.getElementById('searchInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') search();
  });

  async function search() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    document.getElementById('results').innerHTML = `
      <div class="loading">
        <div class="pulse-ring"></div>
        <p>Търсене в социалните мрежи...</p>
      </div>`;
    document.getElementById('statsBar').style.display = 'none';
    document.getElementById('filters').style.display = 'none';

    try {
      const API = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
        ? 'http://localhost:3000'
        : 'https://social-aggregator-production.up.railway.app';

      const response = await fetch(`${API}/search?q=${encodeURIComponent(query)}`);
      allPosts = await response.json();

      document.getElementById('filters').style.display = 'flex';
      currentFilter = 'all';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.filter-btn').classList.add('active');
      renderPosts(allPosts, query);

    } catch (error) {
      document.getElementById('results').innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠️</div>
          <p>Грешка при свързване със сървъра</p>
        </div>`;
    }
  }

  function filterBy(platform, btn) {
    currentFilter = platform;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = platform === 'all' ? allPosts : allPosts.filter(p => p.platform === platform);
    renderPosts(filtered);
  }

  function renderPosts(posts, query) {
    if (!posts.length) {
      document.getElementById('results').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🔍</div>
          <p>Няма намерени резултати</p>
        </div>`;
      return;
    }

    const counts = {};
    allPosts.forEach(p => counts[p.platform] = (counts[p.platform] || 0) + 1);
    
    document.getElementById('statsBar').style.display = 'flex';
    document.getElementById('statsBar').innerHTML = `
      <span>${allPosts.length} резултата${query ? ` за "<strong>${query}</strong>"` : ''}</span>
      <div class="platform-counts">
        ${Object.entries(counts).map(([p, c]) => `
          <span class="platform-count">
            <span class="dot" style="background:${platformColor(p)}"></span>
            ${c} ${p}
          </span>`).join('')}
      </div>`;

    document.getElementById('results').innerHTML = posts.map(post => `
      <div class="post-card" onclick="window.open('${post.url}', '_blank')">
        <div class="card-top">
          <span class="badge badge-${post.platform.toLowerCase()}">${post.platform}</span>
          <div class="card-meta">
            ${post.author ? `<span>👤 ${post.author}</span>` : ''}
            ${post.date ? `<span>📅 ${post.date}</span>` : ''}
          </div>
        </div>
        ${post.thumbnail ? `<img class="card-thumb" src="${post.thumbnail}" alt="">` : ''}
        <div class="card-title"><a href="${post.url}" target="_blank" onclick="event.stopPropagation()">${post.title}</a></div>
        ${post.score || post.comments ? `
        <div class="card-footer">
          ${post.score ? `<span>⬆️ ${post.score}</span>` : ''}
          ${post.comments ? `<span>💬 ${post.comments}</span>` : ''}
        </div>` : ''}
      </div>
    `).join('');
  }

  function platformColor(p) {
    const colors = { HackerNews: '#ff6314', YouTube: '#ff0000', Reddit: '#ff4500', Facebook: '#1877f2', Wikipedia: '#3366cc' };
    return colors[p] || '#7c3aed';
  }
</script>

</body>
</html>
