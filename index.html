<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unify — Social Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #080810;
      color: #f0f0ff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 40px 20px 80px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #0d0118 0%, #1a0533 25%, #2d0f5e 50%, #6b1f9a 75%, #9b3fc8 90%, #c86fd8 100%);
      z-index: 0;
    }

    .mountain {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1;
    }

    .mountain-far {
      height: 300px;
      background: linear-gradient(180deg, #7b2fbe 0%, #4a1080 100%);
      clip-path: polygon(0% 100%, 8% 55%, 18% 75%, 28% 30%, 38% 60%, 48% 15%, 58% 50%, 68% 25%, 78% 65%, 88% 40%, 100% 70%, 100% 100%);
    }

    .mountain-mid {
      height: 220px;
      background: linear-gradient(180deg, #5a1f9a 0%, #2d0f5e 100%);
      clip-path: polygon(0% 100%, 5% 65%, 15% 45%, 25% 70%, 35% 30%, 45% 55%, 55% 20%, 65% 50%, 75% 35%, 85% 60%, 95% 40%, 100% 100%);
    }

    .mountain-near {
      height: 140px;
      background: linear-gradient(180deg, #3a0f7a 0%, #1a0533 100%);
      clip-path: polygon(0% 100%, 10% 50%, 22% 70%, 35% 25%, 48% 60%, 60% 30%, 72% 65%, 85% 40%, 100% 100%);
    }

    .mountain-base {
      height: 60px;
      background: #0d0118;
      clip-path: polygon(0% 100%, 20% 40%, 40% 70%, 60% 30%, 80% 60%, 100% 100%);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 { width: 400px; height: 400px; background: #9d4edd; opacity: 0.4; top: 5%; left: 10%; }
    .orb-2 { width: 300px; height: 300px; background: #c77dff; opacity: 0.3; top: 10%; right: 10%; }
    .orb-3 { width: 200px; height: 200px; background: #ff6eb4; opacity: 0.2; top: 40%; left: 50%; }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: 
        radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 5%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 5%, rgba(255,255,255,0.8) 0%, transparent 100%);
    }

    /* CONTENT */
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 700px;
      width: 100%;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #9d4edd, #c77dff);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 0 40px rgba(157,78,221,0.6);
    }

    .logo-text {
      font-size: 4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff, #e0b8ff, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(199,125,255,0.5));
    }

    .tagline {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      margin-bottom: 48px;
      font-weight: 400;
    }

    /* SEARCH */
    .search-box {
      display: flex;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      margin-bottom: 16px;
      transition: all 0.3s;
    }

    .search-box:focus-within {
      border-color: rgba(157,78,221,0.7);
      box-shadow: 0 0 0 4px rgba(157,78,221,0.15), 0 20px 60px rgba(157,78,221,0.2);
    }

    .search-box input {
      flex: 1;
      padding: 20px 24px;
      background: transparent;
      border: none;
      color: white;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
    }

    .search-box input::placeholder { color: rgba(255,255,255,0.4); }

    .search-btn {
      padding: 10px 28px;
      margin: 8px;
      background: linear-gradient(135deg, #9d4edd, #c77dff);
      border: none;
      border-radius: 14px;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(157,78,221,0.4);
    }

    .search-btn:hover { opacity: 0.9; transform: scale(1.03); }

    .quick-chips {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .chip {
      padding: 7px 16px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .chip:hover {
      border-color: rgba(157,78,221,0.6);
      color: white;
      background: rgba(157,78,221,0.15);
    }

    /* RESULTS SECTION */
    .results-section {
      background: #080810;
      position: relative;
      z-index: 3;
      padding: 40px 20px 80px;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    .filters {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: rgba(157,78,221,0.2);
      border-color: rgba(157,78,221,0.6);
      color: #e0b8ff;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.4);
      font-size: 0.83rem;
    }

    .stats strong { color: white; }

    .platform-pills { display: flex; gap: 8px; flex-wrap: wrap; }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .pill-dot { width: 5px; height: 5px; border-radius: 50%; }

    /* GRID */
    .grid { columns: 3; column-gap: 16px; }
    @media (max-width: 900px) { .grid { columns: 2; } }
    @media (max-width: 560px) { .grid { columns: 1; } }

    .card {
      break-inside: avoid;
      background: #0e0e1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(157,78,221,0.3);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .card-thumb { width: 100%; display: block; object-fit: cover; }
    .card-body { padding: 16px; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .badge {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-hackernews { background: rgba(255,99,20,0.15); color: #fb923c; }
    .badge-youtube { background: rgba(255,0,0,0.15); color: #f87171; }
    .badge-reddit { background: rgba(255,69,0,0.15); color: #fb923c; }
    .badge-facebook { background: rgba(24,119,242,0.15); color: #60a5fa; }

    .pill-hackernews { background: rgba(255,99,20,0.1); color: #fb923c; border-color: rgba(255,99,20,0.2); }
    .pill-youtube { background: rgba(255,0,0,0.1); color: #f87171; border-color: rgba(255,0,0,0.2); }
    .pill-reddit { background: rgba(255,69,0,0.1); color: #fb923c; border-color: rgba(255,69,0,0.2); }
    .pill-facebook { background: rgba(24,119,242,0.1); color: #60a5fa; border-color: rgba(24,119,242,0.2); }

    .card-date { color: rgba(255,255,255,0.3); font-size: 0.72rem; }

    .card-title {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.55;
      color: #f0f0ff;
      margin-bottom: 12px;
    }

    .card-title a { color: inherit; text-decoration: none; }
    .card-title a:hover { color: #c77dff; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-author { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
    .card-stats { display: flex; gap: 10px; font-size: 0.72rem; color: rgba(255,255,255,0.4); }

    /* LOADING */
    .loading { text-align: center; padding: 80px 20px; }
    .loader { display: inline-flex; gap: 6px; margin-bottom: 20px; }
    .loader span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #9d4edd;
      animation: bounce 1.2s infinite;
    }
    .loader span:nth-child(2) { animation-delay: 0.2s; background: #c77dff; }
    .loader span:nth-child(3) { animation-delay: 0.4s; background: #ff6eb4; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-12px); opacity: 1; }
    }
    .loading p { color: rgba(255,255,255,0.4); }
    .empty { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="stars"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="mountain mountain-far"></div>
  <div class="mountain mountain-mid"></div>
  <div class="mountain mountain-near"></div>
  <div class="mountain mountain-base"></div>

  <div class="hero-content">
    <div class="logo-wrap">
      <div class="logo-icon">✦</div>
      <span class="logo-text">Unify</span>
    </div>
    <p class="tagline">Търси в социалните мрежи на едно място</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Elon Musk, AI, Bitcoin, SpaceX..." autocomplete="off" />
      <button class="search-btn" onclick="search()">Търси →</button>
    </div>

    <div class="quick-chips">
      <span class="chip" onclick="quickSearch('Elon Musk')">🚀 Elon Musk</span>
      <span class="chip" onclick="quickSearch('Artificial Intelligence')">🤖 AI</span>
      <span class="chip" onclick="quickSearch('Bitcoin')">₿ Bitcoin</span>
      <span class="chip" onclick="quickSearch('SpaceX')">🛸 SpaceX</span>
      <span class="chip" onclick="quickSearch('Tesla')">⚡ Tesla</span>
    </div>
  </div>
</section>

<!-- RESULTS -->
<section class="results-section" id="resultsSection" style="display:none">
  <div class="container">
    <div class="filters" id="filters">
      <button class="filter-btn active" onclick="filterBy('all',this)">✦ Всички</button>
      <button class="filter-btn" onclick="filterBy('HackerNews',this)">🟠 HackerNews</button>
      <button class="filter-btn" onclick="filterBy('YouTube',this)">🔴 YouTube</button>
      <button class="filter-btn" onclick="filterBy('Reddit',this)">🟤 Reddit</button>
      <button class="filter-btn" onclick="filterBy('Facebook',this)">🔵 Facebook</button>
    </div>
    <div class="stats" id="stats"></div>
    <div id="results"></div>
  </div>
</section>

<script>
  let allPosts = [];

  document.getElementById('searchInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') search();
  });

  function quickSearch(q) {
    document.getElementById('searchInput').value = q;
    search();
  }

  async function search() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('results').innerHTML = `
      <div class="loading">
        <div class="loader"><span></span><span></span><span></span></div>
        <p>Търсене в социалните мрежи...</p>
      </div>`;
    document.getElementById('stats').innerHTML = '';

    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });

    try {
      const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:3000'
        : 'https://social-aggregator-production.up.railway.app';

      const res = await fetch(`${API}/search?q=${encodeURIComponent(query)}`);
      allPosts = await res.json();

      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.filter-btn').classList.add('active');
      renderPosts(allPosts, query);

    } catch(e) {
      document.getElementById('results').innerHTML = `<div class="empty">⚠️ Грешка при свързване</div>`;
    }
  }

  function filterBy(platform, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = platform === 'all' ? allPosts : allPosts.filter(p => p.platform === platform);
    renderPosts(filtered);
  }

  function renderPosts(posts, query) {
    if (!posts.length) {
      document.getElementById('results').innerHTML = `<div class="empty">🔍 Няма намерени резултати</div>`;
      return;
    }

    const counts = {};
    allPosts.forEach(p => counts[p.platform] = (counts[p.platform]||0) + 1);

    document.getElementById('stats').innerHTML = `
      <div>${allPosts.length} резултата${query ? ` за <strong>${query}</strong>` : ''}</div>
      <div class="platform-pills">
        ${Object.entries(counts).map(([p,c]) => `
          <span class="pill pill-${p.toLowerCase()}">
            <span class="pill-dot" style="background:${pColor(p)}"></span>
            ${c} ${p}
          </span>`).join('')}
      </div>`;

    document.getElementById('results').innerHTML = `
      <div class="grid">
        ${posts.map(post => `
          <div class="card" onclick="window.open('${post.url}','_blank')">
            ${post.thumbnail ? `<img class="card-thumb" src="${post.thumbnail}" loading="lazy">` : ''}
            <div class="card-body">
              <div class="card-header">
                <span class="badge badge-${post.platform.toLowerCase()}">${post.platform}</span>
                ${post.date ? `<span class="card-date">${post.date}</span>` : ''}
              </div>
              <div class="card-title">
                <a href="${post.url}" target="_blank" onclick="event.stopPropagation()">${post.title}</a>
              </div>
              <div class="card-footer">
                <span class="card-author">👤 ${post.author || ''}</span>
                <div class="card-stats">
                  ${post.score ? `<span>⬆️ ${post.score}</span>` : ''}
                  ${post.comments ? `<span>💬 ${post.comments}</span>` : ''}
                </div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>`;
  }

  function pColor(p) {
    return { HackerNews:'#fb923c', YouTube:'#f87171', Reddit:'#fb923c', Facebook:'#60a5fa' }[p] || '#c77dff';
  }
</script>
</body>
</html>
