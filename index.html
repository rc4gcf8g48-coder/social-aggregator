<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Aggregator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
      text-align: center;
    }

    header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    header p { opacity: 0.8; font-size: 1.1rem; }

    .search-box {
      display: flex;
      max-width: 600px;
      margin: 30px auto 0;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      padding: 15px 20px;
      border-radius: 50px;
      border: none;
      font-size: 1rem;
      background: rgba(255,255,255,0.2);
      color: white;
      outline: none;
    }

    .search-box input::placeholder { color: rgba(255,255,255,0.6); }

    .search-box button {
      padding: 15px 30px;
      border-radius: 50px;
      border: none;
      background: white;
      color: #764ba2;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    .search-box button:hover { transform: scale(1.05); }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .stats {
      text-align: center;
      color: #aaa;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .post-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border: 1px solid #2a2a4a;
      transition: transform 0.2s;
    }

    .post-card:hover {
      transform: translateY(-2px);
      border-color: #667eea;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .platform-badge {
      background: #ff6314;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .post-date { color: #888; font-size: 0.85rem; }
    .post-author { color: #667eea; font-size: 0.85rem; }

    .post-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .post-title a {
      color: #fff;
      text-decoration: none;
    }

    .post-title a:hover { color: #667eea; }

    .post-footer {
      display: flex;
      gap: 15px;
      color: #888;
      font-size: 0.85rem;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #888;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a4a;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 60px;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  <h1>🔍 Social Aggregator</h1>
  <p>Търси в социалните мрежи на едно място</p>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Напр. Elon Musk, AI, Bitcoin..." />
    <button onclick="search()">Търси</button>
  </div>
</header>

<div class="container">
  <div id="stats" class="stats"></div>
  <div id="results"></div>
</div>

<script>
  document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') search();
  });

  async function search() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    document.getElementById('results').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>Търсене...</p>
      </div>`;
    document.getElementById('stats').innerHTML = '';

    try {
      const response = await fetch(`http://localhost:3000/search?q=${encodeURIComponent(query)}`);
      const posts = await response.json();

      if (!posts.length) {
        document.getElementById('results').innerHTML = '<div class="empty">Няма намерени резултати</div>';
        return;
      }

      document.getElementById('stats').innerHTML = `Намерени ${posts.length} резултата за "<strong>${query}</strong>"`;

      document.getElementById('results').innerHTML = posts.map(post => `
        <div class="post-card">
          <div class="post-header">
            <span class="platform-badge">${post.platform}</span>
            <span class="post-author">👤 ${post.author}</span>
            <span class="post-date">📅 ${post.date}</span>
          </div>
          ${post.thumbnail ? `<img src="${post.thumbnail}" style="width:100%;border-radius:8px;margin-bottom:10px;">` : ''}
<div class="post-title">
  <a href="${post.url}" target="_blank">${post.title}</a>
</div>
          <div class="post-footer">
            <span>⬆️ ${post.score} точки</span>
            <span>💬 ${post.comments} коментара</span>
          </div>
        </div>
      `).join('');

    } catch (error) {
      document.getElementById('results').innerHTML = '<div class="empty">Грешка при свързване със сървъра</div>';
    }
  }
</script>

</body>
</html>
